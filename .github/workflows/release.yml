name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # rusqlite's bundled SQLite is built via cc-rs; the musl entry runs on
  # a glibc host so we point cc-rs at the musl-libc wrapper. Other
  # targets build on a runner whose host triple already matches.
  CC_x86_64_unknown_linux_musl: musl-gcc

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin to 22.04 (glibc 2.35) so the produced binaries stay
          # compatible with a wide range of distros.
          - target: x86_64-unknown-linux-gnu
            runs-on: ubuntu-22.04
            apt: ""
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-22.04
            apt: musl-tools
          - target: aarch64-unknown-linux-gnu
            runs-on: ubuntu-22.04-arm
            apt: ""
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Install apt packages
        if: matrix.apt != ''
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p ananke -p anankectl

      - name: Package archive
        id: package
        run: |
          name="ananke-${{ steps.version.outputs.tag }}-${{ matrix.target }}"
          staging="$(mktemp -d)/$name"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/ananke" "$staging/"
          cp "target/${{ matrix.target }}/release/anankectl" "$staging/"
          cp README.md LICENSE "$staging/"
          (cd "$(dirname "$staging")" && zip -r "$GITHUB_WORKSPACE/$name.zip" "$name")
          echo "archive=$name.zip" >> "$GITHUB_OUTPUT"
          (cd "$GITHUB_WORKSPACE" && sha256sum "$name.zip" > "$name.zip.sha256")
          echo "checksum=$name.zip.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Derive version
        id: version
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          version="${tag#v}"
          prerelease=()
          case "$version" in
            *-*) prerelease=(--prerelease) ;;
          esac
          shopt -s globstar nullglob
          files=( artifacts/**/*.zip artifacts/**/*.sha256 )
          gh release create "$tag" \
            --title "$tag" \
            --generate-notes \
            --verify-tag \
            "${prerelease[@]}" \
            "${files[@]}"
